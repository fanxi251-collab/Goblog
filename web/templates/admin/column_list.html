<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专栏管理 - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        
        /* 导航栏 - 固定顶部 */
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header .nav { display: flex; gap: 32px; }
        .header .nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .header .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .table th { color: #666; font-weight: 500; }
        .btn { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h1>专栏管理</h1>
        <nav class="nav">
            <a href="{{.adminPath}}/">仪表盘</a>
            <a href="{{.adminPath}}/posts">文章</a>
            <a href="{{.adminPath}}/drafts">草稿箱</a>
            <a href="{{.adminPath}}/columns">专栏</a>
            <a href="{{.adminPath}}/comments">留言</a>
            <a href="{{.adminPath}}/article-comments">文章评论</a>
            <a href="{{.adminPath}}/devlogs">开发日志</a>
            <a href="{{.adminPath}}/logout">退出</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <a href="{{.adminPath}}/columns/new" class="btn">新建专栏</a>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>Slug</th>
                        <th>描述</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .columns}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Name}}</td>
                        <td>{{.Slug}}</td>
                        <td>{{.Description}}</td>
                        <td>
                            <a href="{{.adminPath}}/columns/{{.ID}}" class="btn">编辑</a>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
