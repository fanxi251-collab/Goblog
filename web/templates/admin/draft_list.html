<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>草稿箱 - 灵序之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f5f5; }
        
        /* 导航栏 - 固定顶部 */
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header .nav { display: flex; gap: 32px; }
        .header .nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .header .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { color: #666; font-weight: 500; }
        .actions { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>草稿箱</h1>
        <nav class="nav">
            <a href="{{.adminPath}}/">仪表盘</a>
            <a href="{{.adminPath}}/posts">文章</a>
            <a href="{{.adminPath}}/drafts">草稿箱</a>
            <a href="{{.adminPath}}/columns">专栏</a>
            <a href="{{.adminPath}}/comments">留言</a>
            <a href="{{.adminPath}}/article-comments">文章评论</a>
            <a href="{{.adminPath}}/devlogs">开发日志</a>
            <a href="{{.adminPath}}/logout">退出</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <p>共 {{.total}} 篇草稿</p>
            <table>
                <thead>
                    <tr><th>ID</th><th>标题</th><th>操作</th></tr>
                </thead>
                <tbody>
                    {{range .posts}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Title}}</td>
                        <td class="actions">
                            <a href="{{.adminPath}}/posts/{{.ID}}" class="btn">编辑</a>
                            <button onclick="deletePost({{.ID}}, '{{.Title}}')" class="btn btn-danger">删除</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function deletePost(id, title) {
            if (!confirm('确定要删除草稿 "' + title + '" 吗？此操作不可恢复。')) {
                return;
            }
            fetch('/admin/posts/' + id, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('删除失败: ' + (data.error || '未知错误'));
                    }
                })
                .catch(err => {
                    alert('请求失败');
                });
        }
    </script>
</body>
</html>
