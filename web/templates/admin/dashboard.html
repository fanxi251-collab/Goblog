<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header a { color: #fff; text-decoration: none; margin-left: 20px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .stat-card .number { font-size: 36px; font-weight: bold; color: #333; }
        .menu {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .menu h2 { margin-bottom: 20px; color: #333; }
        .menu-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .menu-item {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
        }
        .menu-item:hover {
            background: #667eea;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>奇迹之夏后台管理</h1>
        <nav>
            <a href="/admin/posts">文章</a>
            <a href="/admin/drafts">草稿箱</a>
            <a href="/admin/columns">专栏</a>
            <a href="/admin/comments">留言</a>
            <a href="/admin/article-comments">文章评论</a>
            <a href="/admin/devlogs">开发日志</a>
            <a href="/admin/logout">退出</a>
        </nav>
    </div>
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>文章总数</h3>
                <div class="number">{{.PostsTotal}}</div>
            </div>
            <div class="stat-card">
                <h3>专栏数量</h3>
                <div class="number">{{.ColumnsTotal}}</div>
            </div>
            <div class="stat-card">
                <h3>留言总数</h3>
                <div class="number">{{.CommentTotal}}</div>
            </div>
        </div>
        <div class="menu">
            <h2>快捷操作</h2>
    <div class="menu-list">
        <a href="/admin/posts" class="menu-item">文章管理</a>
        <a href="/admin/drafts" class="menu-item">草稿箱</a>
        <a href="/admin/posts/new" class="menu-item">写文章</a>
        <a href="/admin/columns/new" class="menu-item">新建专栏</a>
        <a href="/admin/comments" class="menu-item">留言管理</a>
        <a href="/admin/article-comments" class="menu-item">文章评论</a>
        <a href="/admin/devlogs" class="menu-item">开发日志</a>
    </div>
</div>
</body>
</html>
