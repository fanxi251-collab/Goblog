<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{if .isNew}}新建日志{{else}}编辑日志{{end}} - 灵序之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
        .header { background: #87CEEB; color: #fff; padding: 20px 40px; }
        .header a { color: #fff; text-decoration: none; margin-right: 20px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .btn-group { display: flex; gap: 12px; }
        .btn { padding: 12px 24px; background: #667eea; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        .btn-publish { background: #28a745; }
        .btn-draft { background: #6c757d; }
        .btn-unpublish { background: #dc3545; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 12px; }
        .status-badge.published { background: #d4edda; color: #155724; }
        .status-badge.draft { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{if .isNew}}新建日志{{else}}编辑日志{{end}}</h1>
        <a href="{{.adminPath}}/devlogs">日志列表</a>
    </div>
    <div class="container">
        <div class="card">
            <form id="devlogForm">
                {{if not .isNew}}
                <input type="hidden" name="id" value="{{.devlog.ID}}">
                {{end}}
                <div class="form-group">
                    <label>状态</label>
                    {{if .devlog.IsPublished}}
                        <span class="status-badge published">已发布</span>
                    {{else}}
                        <span class="status-badge draft">草稿</span>
                    {{end}}
                </div>
                <div class="form-group">
                    <label>发布日期</label>
                    <input type="date" name="date" value="{{formatTime .devlog.Date}}" required>
                </div>
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" name="title" value="{{.devlog.Title}}" required placeholder="例如：添加评论回复功能">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea name="description" placeholder="详细描述这次更新的内容...">{{.devlog.Description}}</textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" name="action" value="draft" class="btn btn-draft">保存为草稿</button>
                    <button type="submit" name="action" value="publish" class="btn btn-publish">保存并发布</button>
                </div>
            </form>
            {{if not .isNew}}
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                {{if .devlog.IsPublished}}
                    <button onclick="unpublishDevlog()" class="btn btn-unpublish">下架</button>
                {{else}}
                    <button onclick="publishDevlog()" class="btn btn-publish">发布</button>
                {{end}}
            </div>
            {{end}}
        </div>
    </div>
    <script>
        document.getElementById('devlogForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/admin/devlogs/save', {
                method: 'POST',
                body: formData
            })
            .then(function(res) { return res.text(); })
            .then(function(data) {
                // 保存成功，跳转到列表页
                window.location.href = '/admin/devlogs';
            })
            .catch(function(err) {
                alert('请求失败: ' + err);
            });
        });

        function publishDevlog() {
            const id = {{.devlog.ID}};
            fetch('/admin/devlogs/' + id + '/publish', { method: 'POST' })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    alert('发布成功');
                    window.location.reload();
                } else {
                    alert(data.error || '发布失败');
                }
            })
            .catch(function(err) {
                alert('请求失败: ' + err);
            });
        }

        function unpublishDevlog() {
            const id = {{.devlog.ID}};
            fetch('/admin/devlogs/' + id + '/unpublish', { method: 'POST' })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    alert('下架成功');
                    window.location.reload();
                } else {
                    alert(data.error || '下架失败');
                }
            })
            .catch(function(err) {
                alert('请求失败: ' + err);
            });
        }
    </script>
</body>
</html>
