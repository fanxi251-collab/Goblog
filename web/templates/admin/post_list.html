<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文章管理 - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
        
        /* 导航栏 - 固定顶部 */
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 { font-size: 22px; font-weight: 600; }
        .header .nav { display: flex; gap: 32px; }
        .header .nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .header .nav a:hover { background: rgba(255,255,255,0.2); color: #fff; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .actions { display: flex; gap: 10px; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
    </style>
</head>
<body>
    <script>
        var adminPath = '{{.adminPath}}';
    </script>
    <div class="header">
        <h1>文章管理</h1>
        <nav class="nav">
            <a href="{{.adminPath}}/">仪表盘</a>
            <a href="{{.adminPath}}/posts">文章</a>
            <a href="{{.adminPath}}/drafts">草稿箱</a>
            <a href="{{.adminPath}}/columns">专栏</a>
            <a href="{{.adminPath}}/comments">留言</a>
            <a href="{{.adminPath}}/article-comments">文章评论</a>
            <a href="{{.adminPath}}/devlogs">开发日志</a>
            <a href="{{.adminPath}}/logout">退出</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <div id="message" class="message"></div>
            
            <!-- 搜索框 -->
            <form method="get" action="/admin/posts" style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" name="keyword" value="{{.keyword}}" placeholder="搜索文章标题或内容..." style="flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;">
                <button type="submit" class="btn">搜索</button>
                {{if .keyword}}
                <a href="{{.adminPath}}/posts" class="btn" style="background: #6c757d;">清除</a>
                {{end}}
            </form>
            
            <p>共 {{.total}} 篇文章</p>
            <table>
                <thead>
                    <tr><th>ID</th><th>标题</th><th>状态</th><th>操作</th></tr>
                </thead>
                <tbody>
                    {{range .posts}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Title}}</td>
                        <td>{{.Status}}</td>
                        <td class="actions">
                            <a href="{{$.adminPath}}/posts/{{.ID}}" class="btn">编辑</a>
                            <button onclick="deletePost({{.ID}}, '{{.Title}}')" class="btn btn-danger">删除</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function deletePost(id, title) {
            if (!confirm('确定要删除文章 "' + title + '" 吗？此操作不可恢复。')) {
                return;
            }
            fetch(adminPath + '/posts/' + id, { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert('删除失败: ' + (data.error || '未知错误'));
                    }
                })
                .catch(err => {
                    alert('请求失败');
                });
        }
    </script>
</body>
</html>
