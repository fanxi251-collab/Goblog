<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文章管理 - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg,667eea 0%,#764ba2 100%); color: #fff; padding: 20px 40px; }
        .header a { color: #fff; text-decoration: none; margin-right: 20px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .btn { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>文章管理</h1>
        <nav>
            <a href="/admin/">仪表盘</a>
            <a href="/admin/posts">文章管理</a>
            <a href="/admin/drafts">草稿箱</a>
            <a href="/admin/posts/new">写文章</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <p>共 {{.total}} 篇文章</p>
            <table>
                <thead>
                    <tr><th>ID</th><th>标题</th><th>状态</th><th>操作</th></tr>
                </thead>
                <tbody>
                    {{range .posts}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{.Title}}</td>
                        <td>{{.Status}}</td>
                        <td><a href="/admin/posts/{{.ID}}">编辑</a></td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
