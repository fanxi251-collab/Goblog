<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header a { color: #fff; text-decoration: none; margin-left: 20px; }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        
        .btn { padding: 12px 24px; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-secondary { background: #6c757d; }
        .btn-group { display: flex; gap: 12px; }
        
        #message { display:none; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        
        /* 工具栏样式 */
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .editor-toolbar button {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .editor-toolbar button:hover { background: #667eea; color: #fff; }
        .editor-toolbar .separator { width: 1px; background: #ddd; margin: 0 5px; }
        
        /* 封面上传样式 */
        .cover-upload { display: flex; flex-direction: column; align-items: flex-start; }
        .cover-preview {
            width: 400px;
            height: 200px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cover-preview:hover { border-color: #667eea; }
        .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
        .cover-placeholder { color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>编辑文章</h1>
        <nav>
            <a href="/admin/">仪表盘</a>
            <a href="/admin/posts">文章管理</a>
            <a href="/admin/drafts">草稿箱</a>
            <a href="/admin/posts/new">写文章</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <form id="postForm">
                <input type="hidden" name="id" value="{{.post.ID}}">
                <input type="hidden" name="slug" value="">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" name="title" value="{{.post.Title}}" required>
                </div>
                <div class="form-group">
                    <label>文章简介</label>
                    <textarea name="excerpt" rows="3" placeholder="请输入文章简介（可选）" style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: vertical;">{{.post.Excerpt}}</textarea>
                </div>
                <div class="form-group">
                    <label>专栏（必选）</label>
                    <select name="column_id" required>
                        <option value="">请选择专栏</option>
                        {{range .columns}}
                        <option value="{{.ID}}" {{if eq .ID $.post.ColumnID}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label>封面图片</label>
                    <input type="hidden" name="cover_image" id="coverImage" value="{{.post.CoverImage}}">
                    <div class="cover-upload">
                        <div class="cover-preview" id="coverPreview">
                            {{if .post.CoverImage}}
                            <img src="/static/{{.post.CoverImage}}" alt="封面预览">
                            {{else}}
                            <div class="cover-placeholder">点击上传封面图片</div>
                            {{end}}
                        </div>
                        <input type="file" id="coverUpload" accept="image/*" style="display:none" onchange="uploadCover(this)">
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('coverUpload').click()" style="margin-top:10px;">上传封面</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>内容（Markdown）</label>
                    <!-- 自定义工具栏 -->
                    <div class="editor-toolbar">
                        <button type="button" onclick="insertFormat('# ', '')">H1</button>
                        <button type="button" onclick="insertFormat('## ', '')">H2</button>
                        <button type="button" onclick="insertFormat('### ', '')">H3</button>
                        <span class="separator"></span>
                        <button type="button" onclick="insertFormat('**', '**)">粗体</button>
                        <button type="button" onclick="insertFormat('*', '*)">斜体</button>
                        <button type="button" onclick="insertFormat('~~', '~~')">删除线</button>
                        <span class="separator"></span>
                        <button type="button" onclick="insertFormat('- ', '')">无序列表</button>
                        <button type="button" onclick="insertFormat('1. ', '')">有序列表</button>
                        <span class="separator"></span>
                        <button type="button" onclick="insertFormat('`', '`')">行内代码</button>
                        <button type="button" onclick="insertFormat('\n```\n', '\n```\n')">代码块</button>
                        <button type="button" onclick="insertFormat('\n> ', '')">引用</button>
                        <button type="button" onclick="insertFormat('[', '](url)')">链接</button>
                        <button type="button" onclick="document.getElementById('imageUpload').click()">图片</button>
                        <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="uploadImage(this)">
                    </div>
                    <textarea name="content" id="content" style="width: 100%; min-height: 400px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 0 0 8px 8px; font-family: monospace; font-size: 14px; line-height: 1.6;">{{.post.Content}}</textarea>
                </div>
                <div id="message"></div>
                <div class="btn-group">
                    <button type="button" onclick="submitPost('publish')" class="btn btn-primary">直接发布</button>
                    <button type="button" onclick="submitPost('draft')" class="btn btn-success">保存草稿</button>
                    <a href="/admin/posts" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 插入格式到文本框
        function insertFormat(prefix, suffix) {
            const textarea = document.getElementById('content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);
            
            const before = text.substring(0, start);
            const after = text.substring(end);
            
            textarea.value = before + prefix + selected + suffix + after;
            textarea.focus();
            
            const newPos = start + prefix.length + selected.length + suffix.length;
            textarea.setSelectionRange(newPos, newPos);
        }

        // 上传图片
        function uploadImage(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/admin/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success || data.success === 1) {
                    // 插入 Markdown 图片链接到文本框
                    insertFormat(data.data.url, '');
                    // 清空 input 以便重复选择同一文件
                    input.value = '';
                } else {
                    alert('上传失败: ' + (data.error || '未知错误'));
                }
            })
            .catch(err => {
                alert('请求失败');
            });
        }

        // 上传封面
        function uploadCover(input) {
            const postID = document.querySelector('input[name="id"]').value;
            if (!postID) {
                alert('请先保存文章后再上传封面');
                return;
            }
            
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('post_id', postID);
            
            fetch('/admin/upload/cover', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success || data.success === 1) {
                    // 更新隐藏字段
                    document.getElementById('coverImage').value = data.data.path;
                    // 更新预览
                    document.getElementById('coverPreview').innerHTML = '<img src="' + data.data.url + '" alt="封面预览">';
                    // 清空 input
                    input.value = '';
                } else {
                    alert('上传失败: ' + (data.error || '未知错误'));
                }
            })
            .catch(err => {
                alert('请求失败');
            });
        }

        function submitPost(action) {
            const form = document.getElementById('postForm');
            const formData = new FormData(form);
            formData.append('action', action);
            
            const messageEl = document.getElementById('message');
            messageEl.style.display = 'none';
            
            fetch('/admin/posts/save', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // 如果是新文章，保存后更新ID以便后续上传封面
                    if (data.id) {
                        document.querySelector('input[name="id"]').value = data.id;
                    }
                    messageEl.style.display = 'block';
                    if (action === 'publish') {
                        messageEl.style.background = '#d4edda';
                        messageEl.style.color = '#155724';
                        messageEl.textContent = '发布成功！';
                    } else {
                        messageEl.style.background = '#fff3cd';
                        messageEl.style.color = '#856404';
                        messageEl.textContent = '保存成功！';
                    }
                    // 保存后不跳转，用户可以继续上传封面
                    if (action === 'publish') {
                        setTimeout(() => {
                            window.location.href = '/admin/posts';
                        }, 1500);
                    }
                } else {
                    messageEl.style.display = 'block';
                    messageEl.style.background = '#f8d7da';
                    messageEl.style.color = '#721c24';
                    messageEl.textContent = '错误: ' + (data.error || '保存失败');
                }
            })
            .catch(err => {
                messageEl.style.display = 'block';
                messageEl.style.background = '#f8d7da';
                messageEl.style.color = '#721c24';
                messageEl.textContent = '请求失败';
            });
        }
    </script>
</body>
</html>
