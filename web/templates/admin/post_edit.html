<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - 奇迹之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        
        .header {
            background: #87CEEB;
            color: #fff;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header a { color: #fff; text-decoration: none; margin-left: 20px; }
        
        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        
        .btn { padding: 12px 24px; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        .btn-secondary { background: #6c757d; }
        .btn-group { display: flex; gap: 12px; }
        
        #message { display:none; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        
        /* 工具栏样式 */
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px;
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
        }
        .editor-toolbar button {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .editor-toolbar button:hover { background: #667eea; color: #fff; }
        .editor-toolbar .separator { width: 1px; background: #ddd; margin: 0 5px; }
        
        /* 封面上传样式 */
        .cover-upload { display: flex; flex-direction: column; align-items: flex-start; }
        .cover-preview {
            width: 400px;
            height: 200px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f9f9f9;
            cursor: pointer;
            transition: all 0.3s;
        }
        .cover-preview:hover { border-color: #667eea; }
        .cover-preview img { width: 100%; height: 100%; object-fit: cover; }
        .cover-placeholder { color: #999; font-size: 14px; }
    #vditor {
            min-height: 400px;
            border-radius: 0 0 8px 8px;
        }
    </style>
</head>
<body>
    <script>var adminPath = '{{.adminPath}}';</script>
    {{template "header" .}}
    <div class="container">
        <div class="card">
            <form id="postForm">
                <input type="hidden" name="id" value="{{.post.ID}}">
                <input type="hidden" name="slug" value="">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" name="title" value="{{.post.Title}}" required>
                </div>
                <div class="form-group">
                    <label>文章简介</label>
                    <textarea name="excerpt" rows="3" placeholder="请输入文章简介（可选）" style="width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; resize: vertical;">{{.post.Excerpt}}</textarea>
                </div>
                <div class="form-group">
                    <label>专栏（必选）</label>
                    <select name="column_id" required>
                        <option value="">请选择专栏</option>
                        {{range .columns}}
                        <option value="{{.ID}}" {{if eq .ID $.post.ColumnID}}selected{{end}}>{{.Name}}</option>
                        {{end}}
                    </select>
                </div>
                <div class="form-group">
                    <label>封面图片</label>
                    <input type="hidden" name="cover_image" id="coverImage" value="{{.post.CoverImage}}">
                    <div class="cover-upload">
                        <div class="cover-preview" id="coverPreview">
                            {{if .post.CoverImage}}
                            <img src="/static/{{.post.CoverImage}}" alt="封面预览">
                            {{else}}
                            <div class="cover-placeholder">点击上传封面图片</div>
                            {{end}}
                        </div>
                        <input type="file" id="coverUpload" accept="image/*" style="display:none" onchange="uploadCover(this)">
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('coverUpload').click()" style="margin-top:10px;">上传封面</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>内容（Markdown）</label>
                    <input type="hidden" name="content" id="content" value="{{.post.Content}}">
                    <div id="vditor"></div>
                </div>
                <div id="message"></div>
                <div class="btn-group">
                    <button type="button" onclick="submitPost('publish')" class="btn btn-primary">直接发布</button>
                    <button type="button" onclick="submitPost('draft')" class="btn btn-success">保存草稿</button>
                    <a href="{{.adminPath}}/posts" class="btn btn-secondary">取消</a>
                </div>
            </form>
        </div>
    </div>

<script>
        // 封面上传函数
        function uploadCover(input) {
            var file = input.files[0];
            if (!file) return;
            
            // 获取文章ID（新建文章时为0）
            var postId = document.querySelector('input[name="id"]').value || 0;
            
            var formData = new FormData();
            formData.append('file', file);
            formData.append('post_id', postId);
            
            console.log('[COVER] Uploading for post_id:', postId);
            
            fetch(adminPath + '/upload/cover', {
                method: 'POST',
                body: formData
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                console.log('[COVER] Response:', data);
                
                if (data.code === 0 && data.data) {
                    // 更新隐藏字段
                    document.getElementById('coverImage').value = data.data.path;
                    // 更新预览图
                    var preview = document.getElementById('coverPreview');
                    preview.innerHTML = '<img src="' + data.data.url + '" alt="封面预览">';
                    console.log('[COVER] Upload done!');
                    alert('封面上传成功！');
                } else {
                    console.error('[COVER] Failed:', data);
                    alert('封面上传失败：' + (data.msg || data.error || '未知错误'));
                }
            })
            .catch(function(err) {
                console.error('[COVER] Error:', err);
                alert('封面上传失败：网络错误');
            });
        }
        
        // 自定义上传函数（正文图片）
        function uploadImage() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                var formData = new FormData();
                formData.append('file', file);
                
                console.log('[CUSTOM UPLOAD] Starting...');
                
                fetch(adminPath + '/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    console.log('[CUSTOM UPLOAD] Response:', data);
                    
                    if (data.code === 0 && data.data && data.data.url) {
                        var md = '![' + data.data.name + '](' + data.data.url + ')';
                        console.log('[CUSTOM UPLOAD] Inserting:', md);
                        window.vditorInstance.insertValue(md);
                        console.log('[CUSTOM UPLOAD] Done!');
                        alert('上传成功！');
                    } else {
                        console.error('[CUSTOM UPLOAD] Failed:', data);
                        alert('上传失败：' + (data.msg || data.error || '未知错误'));
                    }
                })
                .catch(function(err) {
                    console.error('[CUSTOM UPLOAD] Error:', err);
                    alert('上传失败：网络错误');
                });
            };
            input.click();
        }
        
        // 使用全局变量存储 Vditor 实例
        window.vditorInstance = null;
        
        // 先销毁已存在的实例（避免缓存残留）
        if (window.vditor && window.vditor.destroy) {
            window.vditor.destroy();
        }
        
        // 初始化 Vditor（移除内置upload，改用自定义按钮）
        window.vditorInstance = new Vditor('vditor', {
            height: 500,
            mode: 'ir',
            placeholder: '请输入文章内容...',
            value: '',
            toolbar: [
                'headings',
                'bold',
                'italic',
                'strike',
                '|',
                'line',
                'quote',
                'list',
                'ordered-list',
                '|',
                'code',
                'inline-code',
                'link',
                '|',
                {
                    name: 'image',
                    tip: '上传图片',
                    icon: '<svg viewBox="64 64 896 896"><path d="M896 448H448c-17.7 0-32 14.3-32 32v224c0 17.7 14.3 32 32 32h448c17.7 0 32-14.3 32-32V480c0-17.7-14.3-32-32-32zm-448 288V480h448v224H448zm96-160c-17.7 0-32 14.3-32 32v96c0 17.7 14.3 32 32 32h128c17.7 0 32-14.3 32-32V640c0-17.7-14.3-32-32-32H544zm0-64h128c17.7 0 32 14.3 32 32v96c0 17.7-14.3 32-32 32H544c-17.7 0-32-14.3-32-32V640c0-17.7 14.3-32 32-32z"></path></svg>',
                    click: function() {
                        uploadImage();
                    }
                },
                '|',
                'undo',
                'redo'
],
});
        
        // 加载初始内容到 Vditor（先清空再设置，避免残留）
        var initialContent = document.querySelector('input[name="content"]');
        if (initialContent && initialContent.value) {
            window.vditorInstance.empty();
            window.vditorInstance.setValue(initialContent.value);
        }
        
        console.log('Vditor initialized');

        // 提交文章
        function submitPost(action) {
            var vd = window.vditorInstance;
            if (!vd) {
                alert('编辑器未初始化');
                return;
            }
            
            const form = document.getElementById('postForm');
            document.getElementById('content').value = vd.getValue();
            const formData = new FormData(form);
            formData.append('action', action);
            
            const messageEl = document.getElementById('message');
            messageEl.style.display = 'none';
            
            fetch(adminPath + '/posts/save', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // 如果是新文章，保存后更新ID以便后续上传封面
                    if (data.id) {
                        document.querySelector('input[name="id"]').value = data.id;
                    }
                    messageEl.style.display = 'block';
                    if (action === 'publish') {
                        messageEl.style.background = '#d4edda';
                        messageEl.style.color = '#155724';
                        messageEl.textContent = '发布成功！';
                    } else {
                        messageEl.style.background = '#fff3cd';
                        messageEl.style.color = '#856404';
                        messageEl.textContent = '保存成功！';
                    }
                    // 保存后不跳转，用户可以继续上传封面
                    if (action === 'publish') {
                        setTimeout(() => {
                            window.location.href = adminPath + '/posts';
                        }, 1500);
                    }
                } else {
                    messageEl.style.display = 'block';
                    messageEl.style.background = '#f8d7da';
                    messageEl.style.color = '#721c24';
                    messageEl.textContent = '错误: ' + (data.error || '保存失败');
                }
            })
            .catch(err => {
                messageEl.style.display = 'block';
                messageEl.style.background = '#f8d7da';
                messageEl.style.color = '#721c24';
                messageEl.textContent = '请求失败';
            });
        }
    </script>
</body>
</html>
