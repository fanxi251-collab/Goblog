<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发日志 - 灵序之夏后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f5f5f5; }
        .header { background: #87CEEB; color: #fff; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header a { color: #fff; text-decoration: none; margin-left: 20px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        .table th { color: #666; font-weight: 500; }
        .btn { padding: 8px 16px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.9; }
        .btn-success { background: #28a745; }
        .btn-danger { background: #dc3545; }
        .btn-warning { background: #fd7e14; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .status-badge.published { background: #d4edda; color: #155724; }
        .status-badge.draft { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="header">
        <h1>开发日志</h1>
        <nav>
            <a href="{{.adminPath}}/">仪表盘</a>
            <a href="{{.adminPath}}/posts">文章</a>
        </nav>
    </div>
    <div class="container">
        <div class="card">
            <a href="{{.adminPath}}/devlogs/new" class="btn">新建日志</a>
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>日期</th>
                        <th>标题</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .devlogs}}
                    <tr>
                        <td>{{.ID}}</td>
                        <td>{{formatTime .Date}}</td>
                        <td>{{.Title}}</td>
                        <td>{{.Description}}</td>
                        <td>
                            {{if .IsPublished}}
                                <span class="status-badge published">已发布</span>
                            {{else}}
                                <span class="status-badge draft">草稿</span>
                            {{end}}
                        </td>
                        <td>
                            <a href="{{.adminPath}}/devlogs/{{.ID}}" class="btn">编辑</a>
                            {{if .IsPublished}}
                                <button onclick="unpublishDevlog({{.ID}})" class="btn btn-warning">下架</button>
                            {{else}}
                                <button onclick="publishDevlog({{.ID}})" class="btn btn-success">发布</button>
                            {{end}}
                            <button onclick="deleteDevlog({{.ID}})" class="btn btn-danger">删除</button>
                        </td>
                    </tr>
                    {{end}}
                </tbody>
            </table>
        </div>
    </div>
    <script>
        function deleteDevlog(id) {
            if (!confirm('确定要删除这条日志吗？')) return;
            fetch('/admin/devlogs/' + id, { method: 'DELETE' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert(data.error || '删除失败');
                    }
                });
        }

        function publishDevlog(id) {
            fetch('/admin/devlogs/' + id + '/publish', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert(data.error || '发布失败');
                    }
                });
        }

        function unpublishDevlog(id) {
            fetch('/admin/devlogs/' + id + '/unpublish', { method: 'POST' })
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    if (data.success) {
                        location.reload();
                    } else {
                        alert(data.error || '下架失败');
                    }
                });
        }
    </script>
</body>
</html>
