<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f8f9fa; color: #333; line-height: 1.8; }
        .header { background: linear-gradient(135deg,667eea 0%,#764ba2 100%); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .header .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: #fff; }
        .nav a { color: #fff; text-decoration: none; margin-left: 30px; }
        
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .article { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        .article-header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0; }
        .article-title { font-size: 32px; margin-bottom: 15px; color: #333; }
        .article-meta { color: #999; font-size: 14px; }
        .article-meta a { color: #667eea; text-decoration: none; }
        
        .article-content { font-size: 16px; line-height: 1.8; }
        .article-content h1, .article-content h2, .article-content h3 { margin: 30px 0 15px; color: #333; }
        .article-content h1 { font-size: 28px; }
        .article-content h2 { font-size: 24px; }
        .article-content h3 { font-size: 20px; }
        .article-content p { margin-bottom: 20px; }
        .article-content code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .article-content pre { background: #f5f5f5; padding: 20px; border-radius: 8px; overflow-x: auto; margin: 20px 0; }
        .article-content pre code { background: none; padding: 0; }
        .article-content blockquote { border-left: 4px solid #667eea; margin: 20px 0; padding: 10px 20px; background: #f8f9fa; }
        .article-content ul, .article-content ol { margin: 20px 0; padding-left: 30px; }
        .article-content li { margin-bottom: 10px; }
        .article-content a { color: #667eea; }
        .article-content img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
        
        .pagination { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 30px; border-top: 1px solid #f0f0f0; }
        .pagination a { color: #667eea; text-decoration: none; }
        .pagination a:hover { text-decoration: underline; }
        
        .related { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-top: 30px; }
        .related h3 { margin-bottom: 20px; }
        .related ul { list-style: none; padding: 0; }
        .related li { margin-bottom: 10px; }
        .related a { color: #333; text-decoration: none; }
        .related a:hover { color: #667eea; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <a href="/" class="logo">灵序之夏</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/column">专栏</a>
                <a href="/message">留言板</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <article class="article">
            <header class="article-header">
                <h1 class="article-title">{{.post.Title}}</h1>
                <div class="article-meta">
                    <a href="/column/{{.column.Slug}}">{{.column.Name}}</a> · 
                    <span>{{.post.ViewCount}} 阅读</span> · 
                    <span>{{.post.UpdatedAt}}</span>
                </div>
            </header>
            
            <div class="article-content">
                {{.post.Content}}
            </div>
            
            <div class="pagination">
                <span></span>
                <a href="/column/{{.column.Slug}}">返回 {{.column.Name}}</a>
            </div>
        </article>
    </div>
</body>
</html>
