<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f8f9fa; color: #333; line-height: 1.8; }
        .header { background: linear-gradient(135deg,667eea 0%,#764ba2 100%); padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        .header .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: #fff; }
        .nav a { color: #fff; text-decoration: none; margin-left: 30px; }
        
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
        .about-card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        
        .about-header { text-align: center; margin-bottom: 40px; }
        .avatar { 
            width: 120px; height: 120px; 
            border-radius: 50%; 
            background: linear-gradient(135deg,667eea 0%,#764ba2 100%);
            margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; color: #fff;
        }
        .about-header h1 { font-size: 28px; margin-bottom: 10px; }
        .about-header p { color: #666; }
        
        .section { margin-bottom: 30px; }
        .section h2 { font-size: 20px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        .section p { color: #555; }
        
        .skills { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .skill-tag { 
            padding: 8px 16px; 
            background: linear-gradient(135deg,667eea 0%,#764ba2 100%);
            color: #fff; 
            border-radius: 20px; 
            font-size: 14px; 
        }
        
        .contact { margin-top: 30px; }
        .contact a { 
            display: inline-block; 
            padding: 10px 20px; 
            background: #667eea; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 8px; 
            margin-right: 10px;
            transition: opacity 0.3s;
        }
        .contact a:hover { opacity: 0.8; }
        
        .timeline { margin-top: 20px; }
        .timeline-item { 
            padding: 15px 0; 
            border-left: 2px solid #667eea; 
            padding-left: 20px; 
            margin-left: 10px;
        }
        .timeline-item:first-child { border-left: none; padding-left: 0; margin-left: 0; }
        .timeline-date { color: #667eea; font-weight: bold; font-size: 14px; }
        .timeline-content { color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <a href="/" class="logo">灵序之夏</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/column">专栏</a>
                <a href="/message">留言板</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <div class="about-card">
            <div class="about-header">
                <div class="avatar">夏</div>
                <h1>关于我</h1>
                <p>热���技术，热爱生活</p>
            </div>
            
            <div class="section">
                <h2>我是谁</h2>
                <p>一个普通的开发者，喜欢折腾各种有趣的技术。博客命名为"灵序之夏"，希望能在技术的道路上创造属于自己的奇迹。</p>
            </div>
            
            <div class="section">
                <h2>技术栈</h2>
                <div class="skills">
                    <span class="skill-tag">Go</span>
                    <span class="skill-tag">Python</span>
                    <span class="skill-tag">JavaScript</span>
                    <span class="skill-tag">React</span>
                    <span class="skill-tag">Docker</span>
                    <span class="skill-tag">Linux</span>
                </div>
            </div>
            
            <div class="section">
                <h2>联系方式</h2>
                <div class="contact">
                    <a href="mailto:example@email.com">Email</a>
                    <a href="https://github.com" target="_blank">GitHub</a>
                </div>
            </div>
            
            <div class="section">
                <h2>更新日志</h2>
                <div class="timeline">
                    <div class="timeline-item">
                        <div class="timeline-date">2026.04</div>
                        <div class="timeline-content">博客系统上线</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
