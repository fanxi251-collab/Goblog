<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; color: #333; line-height: 1.6; }
        .header { background: linear-gradient(135deg,667eea 0%,#764ba2 100%); padding: 20px 0; position: sticky; top: 0; }
        .header .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: #fff; }
        .nav a { color: #fff; text-decoration: none; margin-left: 30px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-size: 28px; margin-bottom: 30px; }
        
        .message-form { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 40px; }
        .message-form h3 { margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px;
        }
        .form-group textarea { min-height: 120px; resize: vertical; }
        .btn {
            padding: 12px 32px; background: linear-gradient(135deg,667eea 0%,#764ba2 100%);
            color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        
        .comments { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .comment { padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
        .comment:last-child { border-bottom: none; }
        .comment-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .comment-author { font-weight: bold; color: #667eea; }
        .comment-date { color: #999; font-size: 14px; }
        .comment-content { color: #333; }
        
        .empty { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <a href="/" class="logo">灵序之夏</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/column">专栏</a>
                <a href="/message">留言板</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </div>

    <div class="container">
        <h1 class="section-title">留言板</h1>
        
        <div class="message-form">
            <h3>发表评论</h3>
            <form id="messageForm">
                <div class="form-group">
                    <label>昵称 *</label>
                    <input type="text" name="nickname" required placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label>邮箱（选填）</label>
                    <input type="email" name="email" placeholder="用于接收回复通知">
                </div>
                <div class="form-group">
                    <label>内容 *</label>
                    <textarea name="content" required placeholder="想说点什么..."></textarea>
                </div>
                <button type="submit" class="btn">提交留言</button>
            </form>
        </div>

        <div class="comments">
            <h3>全部留言 ({{.total}})</h3>
            {{if .comments}}
                {{range .comments}}
                <div class="comment">
                    <div class="comment-header">
                        <span class="comment-author">{{.Nickname}}</span>
                        <span class="comment-date">{{.CreatedAt}}</span>
                    </div>
                    <div class="comment-content">{{.Content}}</div>
                </div>
                {{end}}
            {{else}}
            <div class="empty">暂无留言，快来抢沙发吧！</div>
            {{end}}
        </div>
    </div>

    <script>
    document.getElementById('messageForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        try {
            const res = await fetch('/message', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (data.success) {
                alert(data.message);
                location.reload();
            } else {
                alert(data.error);
            }
        } catch(err) {
            alert('提交失败，请重试');
        }
    });
    </script>
</body>
</html>
