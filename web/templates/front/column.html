<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; color: #333; }
        .header { background: linear-gradient(135deg,667eea 0%,#764ba2 100%); padding: 20px 0; position: sticky; top: 0; }
        .header .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: #fff; }
        .nav a { color: #fff; text-decoration: none; margin-left: 30px; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .section-title { font-size: 28px; margin-bottom: 30px; }
        .columns-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .column-card { background: #fff; border-radius: 12px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-decoration: none; color: #333; transition: all 0.3s; }
        .column-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .column-card h3 { font-size: 20px; margin-bottom: 10px; color: #667eea; }
        .column-card p { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <a href="/" class="logo">灵序之夏</a>
            <nav class="nav">
                <a href="/">首页</a>
                <a href="/column">专栏</a>
                <a href="/message">留言板</a>
                <a href="/about">关于</a>
            </nav>
        </div>
    </div>
    <div class="container">
        <h1 class="section-title">专栏</h1>
        <div class="columns-grid">
            {{range .columns}}
            <a href="/column/{{.Slug}}" class="column-card">
                <h3>{{.Name}}</h3>
                <p>{{.Description}}</p>
            </a>
            {{end}}
        </div>
    </div>
</body>
</html>
